<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History — Nexus Research</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0d10;
      --surface:  #13151a;
      --border:   #1e2130;
      --accent:   #e8d5a3;
      --accent2:  #7c9ec9;
      --text:     #d4d8e2;
      --muted:    #5a6070;
      --radius:   12px;
      --font-head: 'DM Serif Display', serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 58px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-brand { display: flex; align-items: baseline; gap: 10px; }
    .nav-brand .logo { font-family: var(--font-head); font-size: 22px; color: var(--accent); }
    .nav-brand .tagline { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; font-weight: 500; }

    .nav-links { display: flex; gap: 6px; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 6px;
      transition: color .2s, background .2s;
      font-weight: 500;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--border); }

    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 36px;
      animation: fadeUp .5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .page-header h1 {
      font-family: var(--font-head);
      font-size: 38px;
      color: var(--accent);
    }

    .page-header p {
      color: var(--muted);
      font-size: 13px;
    }

    .header-actions { display: flex; gap: 10px; align-items: center; }

    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-family: var(--font-body);
      transition: all .2s;
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 16px;
      margin-bottom: 24px;
      animation: fadeUp .5s .1s ease both;
    }

    .search-bar svg { color: var(--muted); width: 16px; height: 16px; flex-shrink: 0; }

    .search-bar input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
    }

    .search-bar input::placeholder { color: var(--muted); }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 28px;
      animation: fadeUp .5s .15s ease both;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
    }

    .stat-card .stat-val {
      font-family: var(--font-head);
      font-size: 28px;
      color: var(--accent);
    }

    .stat-card .stat-lbl {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .session-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: fadeUp .5s .2s ease both;
    }

    .session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: all .2s;
      text-decoration: none;
    }

    .session-card:hover {
      border-color: var(--accent);
      transform: translateX(3px);
    }

    .session-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .session-info { flex: 1; min-width: 0; }

    .session-query {
      font-size: 14px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .session-meta {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    .session-arrow {
      color: var(--muted);
      flex-shrink: 0;
      transition: color .2s;
    }

    .session-card:hover .session-arrow { color: var(--accent); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 40px; margin-bottom: 16px; }
    .empty-state h3 { font-family: var(--font-head); font-size: 22px; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: 13px; line-height: 1.6; }
    .empty-state a { color: var(--accent2); text-decoration: none; }
    .empty-state a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <span class="logo">Nexus</span>
    <span class="tagline">Multi-Agent Research</span>
  </div>
  <div class="nav-links">
    <a href="/">Chat</a>
    <a href="/history" class="active">History</a>
    <a href="/about">About</a>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <div>
      <h1>Research History</h1>
      <p>Your past queries, stored locally in this browser.</p>
    </div>
    <div class="header-actions">
      <button class="btn-ghost" onclick="clearHistory()">Clear all</button>
    </div>
  </div>

  <div class="search-bar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Search your queries…" oninput="filterSessions(this.value)" />
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-card">
      <div class="stat-val" id="totalCount">0</div>
      <div class="stat-lbl">Total queries</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="todayCount">0</div>
      <div class="stat-lbl">Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="weekCount">0</div>
      <div class="stat-lbl">This week</div>
    </div>
  </div>

  <div class="session-list" id="sessionList"></div>
</div>

<script>
  const sessions = JSON.parse(localStorage.getItem('nexus_sessions') || '[]');
  const icons = ['🔭','🧬','⚡','🌍','💡','🏛','🔬','🌐','📊','🤖'];

  function randomIcon(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
    return icons[Math.abs(h) % icons.length];
  }

  function timeAgo(ts) {
    const diff = Date.now() - ts;
    const mins = Math.floor(diff / 60000);
    if (mins < 1)   return 'just now';
    if (mins < 60)  return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24)   return `${hrs}h ago`;
    const days = Math.floor(hrs / 24);
    return `${days}d ago`;
  }

  function renderSessions(list) {
    const el = document.getElementById('sessionList');
    if (!list.length) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="icon">📭</div>
          <h3>No queries yet</h3>
          <p>Head to the <a href="/">chat page</a> to run your first research query.</p>
        </div>`;
      return;
    }
    el.innerHTML = [...list].reverse().map(s => `
      <a class="session-card" href="/?q=${encodeURIComponent(s.query)}">
        <div class="session-icon">${randomIcon(s.query)}</div>
        <div class="session-info">
          <div class="session-query">${escHtml(s.query)}</div>
          <div class="session-meta">${timeAgo(s.ts || Date.now())}</div>
        </div>
        <svg class="session-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </a>`).join('');
  }

  function updateStats(list) {
    const now = Date.now();
    const today = list.filter(s => now - (s.ts||0) < 86400000).length;
    const week  = list.filter(s => now - (s.ts||0) < 604800000).length;
    document.getElementById('totalCount').textContent = list.length;
    document.getElementById('todayCount').textContent = today;
    document.getElementById('weekCount').textContent  = week;
  }

  function filterSessions(q) {
    const filtered = q
      ? sessions.filter(s => s.query.toLowerCase().includes(q.toLowerCase()))
      : sessions;
    renderSessions(filtered);
  }

  function clearHistory() {
    if (!sessions.length) return;
    if (!confirm('Clear all research history?')) return;
    sessions.length = 0;
    localStorage.removeItem('nexus_sessions');
    renderSessions([]);
    updateStats([]);
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Init
  renderSessions(sessions);
  updateStats(sessions);
</script>
</body>
</html>
