version: "3.9"

services:
  research:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-research
    ports:
      - "8000:8000"
    env_file:
      - .env                  # loads GROQ_API_KEY and TAVILY_API_KEY
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s